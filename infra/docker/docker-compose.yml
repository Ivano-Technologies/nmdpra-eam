services:
  db:
    image: postgres:15
    container_name: nmdpra-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nmdpra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.api
    container_name: nmdpra-api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/nmdpra
      PORT: 3000
    ports:
      - "3001:3000"

volumes:
  postgres_data:
